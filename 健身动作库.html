<!DOCTYPE html>
<html lang="zh-CN" data-theme="blue">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>健身运动库</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="运动库">
<meta name="theme-color" content="#000000">
<meta name="description" content="海量健身动作库">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{apple:['-apple-system','BlinkMacSystemFont','"SF Pro Display"','"Helvetica Neue"','Arial','sans-serif']}}}}</script>
<style>
:root{--text-primary:#1d1d1f;--text-secondary:#6e6e73;--text-inverse:#fff;--theme-color:#007aff;--theme-hover:#0055b3;--theme-bg-light:rgba(0,122,255,0.12);--bg-primary:#fff;--bg-secondary:#f5f5f7;--search-bg:#fff;--search-text:#1d1d1f;--search-placeholder:#8e8e93;--card-border:rgba(0,0,0,0.06)}
[data-theme="dark"]{--text-primary:#f5f5f7;--text-secondary:#8e8e93;--text-inverse:#1d1d1f;--theme-color:#0a84ff;--theme-hover:#409cff;--theme-bg-light:rgba(10,132,255,0.2);--bg-primary:#1c1c1e;--bg-secondary:#2c2c2e;--search-bg:#2c2c2e;--search-text:#f5f5f7;--search-placeholder:#8e8e93;--card-border:rgba(255,255,255,0.08)}
[data-theme="green"]{--theme-color:#34c759;--theme-hover:#28a745;--theme-bg-light:rgba(52,199,89,0.12)}
[data-theme="green"][data-theme="dark"]{--theme-color:#30d158;--theme-hover:#5ae07a;--theme-bg-light:rgba(48,209,88,0.2)}
[data-theme="orange"]{--theme-color:#ff9500;--theme-hover:#e68a00;--theme-bg-light:rgba(255,149,0,0.12)}
[data-theme="orange"][data-theme="dark"]{--theme-color:#ff9f0a;--theme-hover:#ffb340;--theme-bg-light:rgba(255,159,10,0.2)}
[data-theme="purple"]{--theme-color:#af52de;--theme-hover:#8e44ad;--theme-bg-light:rgba(175,82,222,0.12)}
[data-theme="purple"][data-theme="dark"]{--theme-color:#bf5af2;--theme-hover:#d27df7;--theme-bg-light:rgba(191,90,242,0.2)}
*,*::before,*::after{box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));transition:background 0.3s,color 0.3s;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.glass{backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);background:rgba(255,255,255,0.72)}
[data-theme="dark"] .glass{background:rgba(28,28,30,0.85);border-color:rgba(255,255,255,0.08)}
.workout-card{transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);background:var(--bg-primary);border:1px solid var(--card-border)}
@media(hover:hover){.workout-card:hover{transform:translateY(-4px);box-shadow:0 16px 32px -8px rgba(0,0,0,0.18)}}
.workout-card:active{transform:scale(0.97);transition-duration:0.08s}
.touch-feedback:active{transform:scale(0.94);transition-duration:0.08s}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.search-box{border:2px solid var(--theme-bg-light);transition:all 0.3s}
.search-box:focus-within{border-color:var(--theme-color);box-shadow:0 0 0 4px var(--theme-bg-light)}
.search-box input{background:transparent;color:var(--search-text);font-size:clamp(0.875rem,0.85rem+0.15vw,1rem)}
.search-box input::placeholder{color:var(--search-placeholder)}
.search-container{transition:all 0.35s cubic-bezier(0.32,0.72,0,1);transform-origin:right center}
.search-container.hidden-search{transform:scaleX(0);opacity:0;width:0;margin:0;pointer-events:none}
.search-container.visible-search{transform:scaleX(1);opacity:1;width:100%;pointer-events:auto}
.brand-text{transition:opacity 0.3s,transform 0.3s}
.brand-text.hidden-brand{opacity:0;transform:scale(0.95);pointer-events:none}
.pill{border-radius:999px;padding:0.5rem 1rem;font-size:clamp(0.75rem,0.72rem+0.12vw,0.875rem);font-weight:500;white-space:nowrap;cursor:pointer;transition:all 0.2s;min-height:44px;display:inline-flex;align-items:center;border:1px solid var(--card-border)}
.pill.active{background:var(--theme-color)!important;color:#fff!important;border-color:var(--theme-color)!important}
.pill:not(.active){background:var(--bg-secondary);color:var(--text-secondary)}
.pill:not(.active):hover{background:var(--theme-bg-light);color:var(--theme-color)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slideDownOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(30px) scale(0.96)}}
.animate-in{animation:slideUp 0.35s cubic-bezier(0.25,0.46,0.45,0.94)}
.animate-out{animation:slideDownOut 0.25s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
@media(prefers-reduced-motion){.animate-in,.animate-out{animation:none}}
@media(min-width:768px){.card-grid{grid-template-columns:repeat(2,1fr)!important}}
@media(min-width:1024px){.card-grid{grid-template-columns:repeat(3,1fr)!important}}
@media(max-width:767px){#detailOverlay>div,#searchOverlay>div,#calcOverlay>div,#themeOverlay>div{border-radius:20px 20px 0 0!important;margin:0!important;max-width:100%!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;max-height:88vh!important}#searchOverlay,#detailOverlay,#calcOverlay,#themeOverlay{align-items:flex-end!important;padding-top:0!important}}
.bottom-safe{padding-bottom:env(safe-area-inset-bottom,0px)}
</style>
</head>
<body>

<!-- 顶部导航 -->
<header class="fixed top-0 left-0 w-full z-50 glass border-b border-white/10">
  <div class="px-4 h-14 flex items-center justify-between gap-2 max-w-6xl mx-auto">
    <div id="brand" class="flex items-center gap-1.5 flex-shrink-0">
      <span class="text-xl">💪</span><span class="brand-text text-sm font-medium hidden sm:block">运动库</span>
    </div>
    <div id="searchContainer" class="search-container hidden-search flex-1">
      <div class="search-box relative rounded-full">
        <input type="text" id="searchInput" placeholder="搜索动作、肌群、器械..." class="w-full rounded-full px-4 py-2.5 outline-none">
        <button id="searchClose" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-full hover:bg-black/5 text-sm" style="color:var(--text-secondary)">✕</button>
      </div>
    </div>
    <div class="flex items-center gap-1 flex-shrink-0">
      <button id="searchToggle" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 touch-feedback text-xl" style="color:var(--text-primary)">🔍</button>
      <button onclick="openCalc()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 touch-feedback text-xl" style="color:var(--text-primary)">📐</button>
      <div class="relative">
        <button id="themeBtn" onclick="openTheme()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 touch-feedback text-xl" style="color:var(--text-primary)">🎨</button>
      </div>
    </div>
  </div>
</header>

<!-- 主内容 -->
<main class="max-w-6xl mx-auto px-4 pt-20 pb-8">
  <!-- Hero -->
  <section class="rounded-2xl mb-6 p-6 sm:p-10" style="background:var(--theme-bg-light)">
    <span class="text-xs font-semibold tracking-[0.2em] uppercase" style="color:var(--text-secondary)">动作库</span>
    <h1 class="text-3xl sm:text-5xl font-bold tracking-tight mt-2 leading-[1.1]">探索 <span id="heroCount" style="color:var(--theme-color)">---</span> 个训练动作</h1>
    <p class="text-sm mt-2 max-w-md" style="color:var(--text-secondary)">覆盖全身肌群，从入门到专业。点击筛选或搜索，找到适合你的动作。</p>
    <button onclick="resetAll()" class="mt-4 px-6 py-3 rounded-full text-sm font-medium text-white touch-feedback" style="background:var(--theme-color)">浏览全部</button>
  </section>

  <!-- 筛选区 -->
  <div class="mb-6"><h2 class="text-sm font-semibold mb-2" style="color:var(--text-secondary)">🎯 目标肌群（单选）</h2><div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="musclePills"></div></div>
  <div class="mb-6"><h2 class="text-sm font-semibold mb-2" style="color:var(--text-secondary)">🏃 动作类型（单选）</h2><div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="categoryPills"></div></div>
  <div class="mb-6"><h2 class="text-sm font-semibold mb-2" style="color:var(--text-secondary)">🔧 器械（多选）</h2><div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="equipPills"></div></div>
  <div class="mb-6"><h2 class="text-sm font-semibold mb-2" style="color:var(--text-secondary)">📊 难度（多选）</h2><div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="diffPills"></div></div>

  <!-- 结果 -->
  <div class="flex items-center justify-between mb-3"><h2 class="text-lg font-semibold" id="resultLabel">全部动作</h2><span class="text-sm" style="color:var(--text-secondary)" id="resultCount"></span></div>
  <div class="grid grid-cols-1 card-grid gap-3 md:gap-4" id="cardGrid"></div>
  <p class="text-center text-[11px] mt-12 pb-4" style="color:var(--text-secondary);opacity:0.4">健身运动库 · Apple 设计语言</p>
</main>

<!-- 底部 Tab -->
<footer class="fixed bottom-0 left-0 w-full glass border-t bottom-safe z-40" style="border-color:var(--card-border)">
  <div class="max-w-6xl mx-auto px-4 h-[64px] flex items-center justify-around text-xs font-medium">
    <div class="flex flex-col items-center gap-0.5 touch-feedback" onclick="resetAll()"><span class="text-xl">🏠</span><span style="color:var(--text-primary)">首页</span></div>
    <div class="flex flex-col items-center gap-0.5 touch-feedback" onclick="document.getElementById('searchToggle').click()"><span class="text-xl">🔍</span><span style="color:var(--text-primary)">搜索</span></div>
    <div class="flex flex-col items-center gap-0.5 touch-feedback" onclick="openCalc()"><span class="text-xl">📐</span><span style="color:var(--text-primary)">计算器</span></div>
    <div class="flex flex-col items-center gap-0.5 touch-feedback" onclick="openTheme()"><span class="text-xl">🎨</span><span style="color:var(--text-primary)">主题</span></div>
  </div>
</footer>

<!-- 主题弹窗 -->
<div id="themeOverlay" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-sm flex items-start justify-center pt-20">
  <div id="themeCard" class="w-full max-w-sm mx-4 rounded-2xl overflow-hidden animate-in" style="background:var(--bg-primary);border:1px solid var(--card-border);box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div class="p-4 border-b flex items-center justify-between" style="border-color:var(--card-border)"><span class="font-semibold">🎨 主题设置</span><button onclick="closeTheme()" class="w-8 h-8 rounded-full flex items-center justify-center text-sm hover:bg-black/5" style="color:var(--text-secondary)">✕</button></div>
    <div class="p-4 space-y-4">
      <div><p class="text-xs font-semibold mb-2 uppercase tracking-wider" style="color:var(--text-secondary)">主题色</p><div class="flex gap-2">'
        <button onclick="setTheme('blue')" class="w-9 h-9 rounded-full touch-feedback" style="background:#007aff;border:3px solid var(--bg-primary);box-shadow:0 0 0 2px var(--theme-color)"></button>
        <button onclick="setTheme('green')" class="w-9 h-9 rounded-full touch-feedback" style="background:#34c759"></button>
        <button onclick="setTheme('orange')" class="w-9 h-9 rounded-full touch-feedback" style="background:#ff9500"></button>
        <button onclick="setTheme('purple')" class="w-9 h-9 rounded-full touch-feedback" style="background:#af52de"></button>
      </div></div>
      <div><p class="text-xs font-semibold mb-2 uppercase tracking-wider" style="color:var(--text-secondary)">外观模式</p>
        <button onclick="toggleDarkMode()" id="darkToggle" class="w-full py-3 rounded-xl text-sm font-medium touch-feedback" style="background:var(--bg-secondary);color:var(--text-primary)">🌙 深色模式</button>
      </div>
    </div>
  </div>
</div>

<!-- 搜索弹窗 -->
<div id="searchOverlay" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-sm flex items-start justify-center pt-24">
  <div id="searchCard" class="w-full max-w-lg mx-4 rounded-2xl overflow-hidden animate-in" style="background:var(--search-bg);border:1px solid var(--card-border)">
    <div class="p-4 border-b flex gap-3 items-center" style="border-color:var(--card-border)"><span class="text-lg">🔍</span><input type="text" id="overlaySearchInput" placeholder="搜索动作名称、肌群、器械..." class="flex-1 bg-transparent outline-none" style="color:var(--search-text);font-size:1rem"><button onclick="closeSearch()" class="text-sm px-3 py-1 rounded-full touch-feedback" style="background:var(--bg-secondary);color:var(--search-text)">取消</button></div>
    <div id="searchResults" class="max-h-80 overflow-y-auto p-2"></div>
  </div>
</div>

<!-- 详情弹窗 -->
<div id="detailOverlay" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-sm flex items-start justify-center pt-16 overflow-y-auto">
  <div id="detailCard" class="w-full max-w-lg mx-4 my-4 rounded-2xl overflow-hidden animate-in" style="background:var(--bg-primary);border:1px solid var(--card-border);box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div class="p-4 border-b flex items-center justify-between" style="border-color:var(--card-border)"><span class="text-sm" style="color:var(--text-secondary)" id="detailBreadcrumb"></span><button onclick="closeDetail()" class="w-8 h-8 rounded-full flex items-center justify-center touch-feedback" style="background:var(--bg-secondary);color:var(--text-secondary)">✕</button></div>
    <div class="p-5 space-y-4 max-h-[70vh] overflow-y-auto" id="detailContent"></div>
    <div class="p-4 border-t flex gap-3" style="border-color:var(--card-border)"><button class="flex-1 py-3 rounded-xl text-sm font-semibold text-white touch-feedback" style="background:var(--theme-color)">📋 添加到计划</button><button onclick="closeDetail()" class="px-5 py-3 rounded-xl text-sm font-medium touch-feedback" style="background:var(--bg-secondary);color:var(--text-primary)">返回</button></div>
  </div>
</div>

<!-- 计算器弹窗 -->
<div id="calcOverlay" class="fixed inset-0 z-[60] hidden bg-black/60 backdrop-blur-sm flex items-start justify-center pt-20">
  <div id="calcCard" class="w-full max-w-md mx-4 rounded-2xl overflow-hidden animate-in" style="background:var(--bg-primary);border:1px solid var(--card-border);box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div class="p-4 border-b flex items-center justify-between" style="border-color:var(--card-border)"><span class="font-semibold">📐 身体数据计算器</span><button onclick="closeCalc()" class="w-8 h-8 rounded-full flex items-center justify-center touch-feedback" style="background:var(--bg-secondary);color:var(--text-secondary)">✕</button></div>
    <div class="p-5 space-y-4">
      <div class="flex gap-3"><button id="btnMale" onclick="setGender('male',this)" class="flex-1 py-2.5 rounded-xl text-sm font-medium touch-feedback" style="background:var(--theme-color);color:#fff">男性</button><button id="btnFemale" onclick="setGender('female',this)" class="flex-1 py-2.5 rounded-xl text-sm font-medium touch-feedback" style="background:var(--bg-secondary);color:var(--text-secondary)">女性</button></div>
      <div><label class="text-xs font-semibold uppercase tracking-wider mb-1 block" style="color:var(--text-secondary)">身高 (cm)</label><input id="inHeight" type="number" placeholder="例：175" class="w-full py-3 px-4 rounded-xl border outline-none" style="border-color:var(--card-border);background:var(--bg-secondary);color:var(--text-primary)"></div>
      <div><label class="text-xs font-semibold uppercase tracking-wider mb-1 block" style="color:var(--text-secondary)">体重 (kg)</label><input id="inWeight" type="number" placeholder="例：70" class="w-full py-3 px-4 rounded-xl border outline-none" style="border-color:var(--card-border);background:var(--bg-secondary);color:var(--text-primary)"></div>
      <div><label class="text-xs font-semibold uppercase tracking-wider mb-1 block" style="color:var(--text-secondary)">年龄</label><input id="inAge" type="number" placeholder="例：25" class="w-full py-3 px-4 rounded-xl border outline-none" style="border-color:var(--card-border);background:var(--bg-secondary);color:var(--text-primary)"></div>
      <div id="calcResult" class="hidden space-y-3 pt-3 border-t" style="border-color:var(--card-border)"><div class="flex justify-between"><span style="color:var(--text-secondary)">BMI</span><span class="text-xl font-bold" id="resBmi">--</span></div><div class="flex justify-between"><span style="color:var(--text-secondary)">评价</span><span class="font-semibold" id="resBmiLabel">--</span></div><div class="flex justify-between"><span style="color:var(--text-secondary)">基础代谢</span><span class="text-xl font-bold" id="resBmr">--</span><span style="color:var(--text-secondary)">千卡/天</span></div></div>
      <button onclick="doCalc()" class="w-full py-3 rounded-xl text-sm font-semibold text-white touch-feedback" style="background:var(--theme-color)">计算</button>
    </div>
  </div>
</div>

<script>
// ==================== 动作数据引擎 ====================
(function(){
var diff={入门:1,初级:2,中级:3,高级:4,专业:5};
var eq={barbell:['杠铃'],dumbbell:['哑铃'],machine:['固定器械'],cable:['绳索(龙门架)'],bodyweight:['自重'],kettlebell:['壶铃'],band:['弹力带']};

// 搜索交互（导航栏 + 弹窗）
(function(){var si=document.getElementById('searchInput'),st=document.getElementById('searchToggle'),sc=document.getElementById('searchContainer'),scl=document.getElementById('searchClose'),br=document.getElementById('brand'),isOpen=false;
st.addEventListener('click',function(){isOpen=!isOpen;if(isOpen){sc.classList.remove('hidden-search');sc.classList.add('visible-search');br.classList.add('hidden-brand');setTimeout(function(){si.focus();},200);}else{sc.classList.remove('visible-search');sc.classList.add('hidden-search');br.classList.remove('hidden-brand');}});
scl.addEventListener('click',function(){isOpen=false;sc.classList.remove('visible-search');sc.classList.add('hidden-search');br.classList.remove('hidden-brand');si.value='';state.query='';applyFilters();});
var dt;si.addEventListener('input',function(){clearTimeout(dt);var self=this;dt=setTimeout(function(){state.query=self.value.trim();applyFilters();},200);});})();

// 搜索弹窗
(function(){var oi=document.getElementById('overlaySearchInput'),sr=document.getElementById('searchResults'),dt;
window.openSearch=function(){var o=document.getElementById('searchOverlay'),sc=document.getElementById('searchCard');o.classList.remove('hidden');sc.classList.add('animate-in');document.body.style.overflow='hidden';oi.focus();};
window.closeSearch=function(){var sc=document.getElementById('searchCard'),o=document.getElementById('searchOverlay');sc.classList.add('animate-out');setTimeout(function(){o.classList.add('hidden');sc.classList.remove('animate-in','animate-out');oi.value='';state.query='';document.body.style.overflow=isOverlayOpen()?'hidden':'';applyFilters();},250);};
oi.addEventListener('input',function(){clearTimeout(dt);var self=this;dt=setTimeout(function(){var q=self.value.trim();state.query=q;if(!q){sr.innerHTML='';applyFilters();return;}var matches=state.exercises.filter(function(ex){return H.searchMatch(ex,q);}).slice(0,20);if(matches.length===0){sr.innerHTML='<p class="text-sm text-center py-8" style="color:var(--text-secondary)">未找到匹配动作</p>';}else{var h='';matches.forEach(function(ex){h+='<div class="px-4 py-3 rounded-xl cursor-pointer search-result-item" data-sid="'+ex.id+'" style="color:var(--search-text)"><span class="font-medium">'+ex.name+'</span><span class="text-xs ml-2" style="color:var(--search-placeholder)">'+H.getDiffStars(ex.difficulty)+'</span></div>';});sr.innerHTML=h;}applyFilters();},200);});sr.addEventListener('click',function(e){var el=e.target.closest('[data-sid]');if(el){closeSearch();showDetail(el.getAttribute('data-sid'));}});
document.getElementById('searchOverlay').addEventListener('click',function(e){if(e.target===this)closeSearch();});})();

// 计算器
var calcGender='male';
window.setGender=function(g,el){calcGender=g;document.getElementById('btnMale').style.cssText='background:'+(g==='male'?'var(--theme-color)':'var(--bg-secondary)')+';color:'+(g==='male'?'#fff':'var(--text-secondary)');document.getElementById('btnFemale').style.cssText='background:'+(g==='female'?'var(--theme-color)':'var(--bg-secondary)')+';color:'+(g==='female'?'#fff':'var(--text-secondary)');};
window.doCalc=function(){var h=parseFloat(document.getElementById('inHeight').value),w=parseFloat(document.getElementById('inWeight').value),a=parseInt(document.getElementById('inAge').value);if(!h||!w||!a){alert('请填写完整的身高、体重和年龄');return;}var bmi=w/((h/100)*(h/100)),bmr=calcGender==='male'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161,label='';if(bmi<18.5)label='偏瘦';else if(bmi<24)label='正常 ✅';else if(bmi<28)label='偏重';else label='肥胖';document.getElementById('resBmi').textContent=bmi.toFixed(1);document.getElementById('resBmiLabel').textContent=label;document.getElementById('resBmr').textContent=Math.round(bmr);document.getElementById('calcResult').classList.remove('hidden');};
window.openCalc=function(){var o=document.getElementById('calcOverlay'),cc=document.getElementById('calcCard');o.classList.remove('hidden');cc.classList.add('animate-in');document.body.style.overflow='hidden';};
window.closeCalc=function(){var cc=document.getElementById('calcCard'),o=document.getElementById('calcOverlay');cc.classList.add('animate-out');setTimeout(function(){o.classList.add('hidden');cc.classList.remove('animate-in','animate-out');document.body.style.overflow=isOverlayOpen()?'hidden':'';},250);};

// 主题
window.setTheme=function(color){document.documentElement.setAttribute('data-theme',color);try{localStorage.setItem('fitness-color',color);}catch(e){}};
window.toggleDarkMode=function(){var current=document.documentElement.getAttribute('data-theme'),isDark=current.indexOf('dark')!==-1;var next=isDark?current.replace('-dark',''):current+'-dark';document.documentElement.setAttribute('data-theme',next);try{localStorage.setItem('fitness-color',next);}catch(e){}document.getElementById('darkToggle').innerHTML=(next.indexOf('dark')!==-1?'☀️':'🌙')+' '+(next.indexOf('dark')!==-1?'浅色模式':'深色模式');};
window.openTheme=function(){var o=document.getElementById('themeOverlay'),tc=document.getElementById('themeCard');o.classList.remove('hidden');tc.classList.add('animate-in');document.body.style.overflow='hidden';};
window.closeTheme=function(){var tc=document.getElementById('themeCard'),o=document.getElementById('themeOverlay');tc.classList.add('animate-out');setTimeout(function(){o.classList.add('hidden');tc.classList.remove('animate-in','animate-out');document.body.style.overflow=isOverlayOpen()?'hidden':'';},250);};

// 工具
function isOverlayOpen(){return !document.getElementById('searchOverlay').classList.contains('hidden')||!document.getElementById('detailOverlay').classList.contains('hidden')||!document.getElementById('calcOverlay').classList.contains('hidden')||!document.getElementById('themeOverlay').classList.contains('hidden');}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeSearch();closeDetail();closeCalc();closeTheme();}});
document.getElementById('detailOverlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});
document.getElementById('calcOverlay').addEventListener('click',function(e){if(e.target===this)closeCalc();});
document.getElementById('themeOverlay').addEventListener('click',function(e){if(e.target===this)closeTheme();});

// 启动
function init(){state.exercises=window.ALL_EXERCISES||[];state.filtered=state.exercises.slice();var saved;try{saved=localStorage.getItem('fitness-color');}catch(e){saved=null;}if(saved)document.documentElement.setAttribute('data-theme',saved);initPills();renderCards();console.log('✅ 健身运动库已就绪 — '+state.exercises.length+' 个动作');}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
