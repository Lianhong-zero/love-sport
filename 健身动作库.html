<!-- ===== 顶部导航 ===== -->
<header class="fixed top-0 left-0 w-full z-50 glass glass-light dark:glass-dark border-b border-subtle">

<main class="max-w-6xl mx-auto px-5 pt-20">

    <div class="flex gap-3 mt-5 justify-center sm:justify-start">

  </section>

</div>

(function(){
var H={
  getDifficultyLabel:function(l){return['','入门','初级','中级','高级','专业'][l]||'未知';},
  getDiffStars:function(l){var s='';for(var i=0;i<l;i++)s+='⭐';return s;},
  searchMatch:function(ex,q){if(!q)return true;var f=[ex.name,ex.category].concat(ex.targetMuscles).concat(ex.secondaryMuscles).concat(ex.equipment).concat([ex.bodyRegion]);q=q.toLowerCase();return f.some(function(t){if(!t)return false;t=t.toLowerCase();if(t.indexOf(q)!==-1)return true;var ci=0;for(var i=0;i<t.length;i++){if(t[i]===q[ci])ci++;if(ci===q.length)return true;}return false;});}
};

var state={exercises:window.ALL_EXERCISES||[],filtered:[],filters:{muscles:{},categories:{},equipment:{},difficulties:{}},query:'',view:'list',selected:null};
state.filtered=state.exercises.slice();

function applyFilters(){
  var f=state.filters,r=state.exercises.slice();
  var mk=Object.keys(f.muscles);
  if(mk.length>0){var mm={chest:['胸大肌','胸部'],back:['背阔肌','斜方肌','菱形肌','竖脊肌','背部'],legs:['股四头肌','腘绳肌','小腿','腿部'],shoulders:['三角肌','肩部'],arms:['肱二头肌','肱三头肌','前臂','手臂'],abs:['腹直肌','腹斜肌','核心肌群','腹部'],glutes:['臀大肌','臀中肌','臀小肌','臀部']};r=r.filter(function(ex){var allM=ex.targetMuscles.concat(ex.secondaryMuscles||[]);return mk.some(function(k){var kw=mm[k]||[];return allM.some(function(m){return kw.some(function(w){return m.indexOf(w)!==-1;});});});});}
  var ck=Object.keys(f.categories);
  if(ck.length>0){var cm={squat:'深蹲类',bench:'卧推类',row:'划船类',deadlift:'硬拉类',curl:'弯举类',press:'推举类',pulldown:'下拉类',crunch:'腹肌类',fly:'飞鸟类',raise:'平举类'};r=r.filter(function(ex){return ck.some(function(k){return ex.category===cm[k];});});}
  var ek=Object.keys(f.equipment);
  if(ek.length>0){var em={barbell:'杠铃',dumbbell:'哑铃',machine:'固定器械',cable:'绳索',bodyweight:'自重',kettlebell:'壶铃',band:'弹力带'};r=r.filter(function(ex){return ex.equipment.some(function(eq){return ek.some(function(k){return eq.indexOf(em[k])!==-1;});});});}
  var dk=Object.keys(f.difficulties);
  if(dk.length>0){r=r.filter(function(ex){return dk.some(function(k){return ex.difficulty===parseInt(k);});});}
  if(state.query){r=r.filter(function(ex){return H.searchMatch(ex,state.query);});}
  state.filtered=r;renderCards();
}

function toggleFilter(cat,val,el){
  if(state.filters[cat][val]){delete state.filters[cat][val];el.classList.remove('pill-active');el.classList.add('pill-idle');}
  else{state.filters[cat][val]=true;el.classList.add('pill-active');el.classList.remove('pill-idle');}
  applyFilters();
}

// 初始化筛选 pills
function initPills(){
  var muscles=[{k:'chest',n:'胸部'},{k:'back',n:'背部'},{k:'legs',n:'腿部'},{k:'shoulders',n:'肩部'},{k:'arms',n:'手臂'},{k:'abs',n:'腹肌'},{k:'glutes',n:'臀部'}];
  var cats=[{k:'squat',n:'深蹲类'},{k:'bench',n:'卧推类'},{k:'row',n:'划船类'},{k:'deadlift',n:'硬拉类'},{k:'curl',n:'弯举类'},{k:'press',n:'推举类'},{k:'pulldown',n:'下拉类'},{k:'crunch',n:'腹肌类'},{k:'fly',n:'飞鸟类'},{k:'raise',n:'平举类'}];
  var equips=[{k:'barbell',n:'杠铃'},{k:'dumbbell',n:'哑铃'},{k:'machine',n:'固定器械'},{k:'cable',n:'绳索'},{k:'bodyweight',n:'自重'},{k:'kettlebell',n:'壶铃'},{k:'band',n:'弹力带'}];
  var diffs=[{k:'1',n:'入门'},{k:'2',n:'初级'},{k:'3',n:'中级'},{k:'4',n:'高级'},{k:'5',n:'专业'}];

  function makePills(containerId, items, cat){
    var c=document.getElementById(containerId);if(!c)return;
    c.innerHTML='';
    items.forEach(function(item){
      var el=document.createElement('span');
      el.className='px-5 py-2.5 rounded-full text-sm font-medium whitespace-nowrap cursor-pointer transition-all pill-idle';
      el.textContent=item.n;
      el.addEventListener('click',function(){toggleFilter(cat,item.k,el);});
      c.appendChild(el);
    });
  }
  makePills('musclePills',muscles,'muscles');
  makePills('categoryPills',cats,'categories');
  makePills('equipPills',equips,'equipment');
  makePills('diffPills',diffs,'difficulties');
}

function renderCards(){
  if(state.view!=='list')return;
  var grid=document.getElementById('cardGrid'),total=state.filtered.length;
  document.getElementById('resultCount').textContent=total+' 个动作';
  document.getElementById('heroCount').textContent=total;
  var ac=Object.keys(state.filters.muscles).length+Object.keys(state.filters.categories).length+Object.keys(state.filters.equipment).length+Object.keys(state.filters.difficulties).length;
  document.getElementById('resultLabel').textContent=(ac>0||state.query)?'筛选结果':'全部动作';
  if(!grid)return;grid.innerHTML='';
  if(total===0){grid.innerHTML='<div class="col-span-full text-center py-16 text-secondary"><span class="text-5xl block mb-4">🔍</span><p class="text-lg">没有匹配的动作</p><p class="text-sm mt-2 opacity-60">尝试调整筛选条件或搜索关键词</p></div>';return;}
  var html='';
  for(var i=0;i<state.filtered.length;i++){(function(ex){
    var star=H.getDiffStars(ex.difficulty);
    html+='<div class="bg-card card-hover rounded-2xl border border-subtle p-5 cursor-pointer" data-id="'+ex.id+'"><div class="flex items-start justify-between mb-3"><span class="text-3xl">'+({'深蹲类':'🦵','卧推类':'🏋️','划船类':'🚣','硬拉类':'🏋️','弯举类':'💪','推举类':'🙆','下拉类':'🧗','腹肌类':'🔥','飞鸟类':'🕊️','弓步类':'🚶','平举类':'🕊️','臂屈伸':'💪'}[ex.category]||'🏋️')+'</span><span class="text-xs text-secondary">'+star+'</span></div><h3 class="font-semibold text-primary text-base">'+ex.name+'</h3><div class="flex flex-wrap gap-1.5 mt-2">'+(ex.targetMuscles[0]?'<span class="text-[10px] px-2 py-0.5 rounded-full bg-[#007aff]/10 text-[#007aff] font-medium">'+ex.targetMuscles[0]+'</span>':'')+(ex.equipment[0]?'<span class="text-[10px] px-2 py-0.5 rounded-full bg-white/5 dark:bg-white/5 text-secondary font-medium border border-subtle">'+ex.equipment[0]+'</span>':'')+'</div><div class="flex justify-between items-center mt-3 text-xs text-secondary"><span>'+ex.bodyRegion+'</span><span class="font-medium">'+H.getDifficultyLabel(ex.difficulty)+'</span></div></div>';

}

window.closeDetail=function(){state.view='list';var dc=document.getElementById('detailCard'),d=document.getElementById('detailOverlay');dc.classList.add('animate-out');setTimeout(function(){d.classList.add('hidden');dc.classList.remove('animate-in','animate-out');document.body.style.overflow=isOverlayOpen()?'hidden':'';},250);};
window.resetAll=function(){state.filters={muscles:{},categories:{},equipment:{},difficulties:{}};state.query='';document.getElementById('searchInput').value='';initPills();state.filtered=state.exercises.slice();renderCards();};
window.openSearch=function(){var o=document.getElementById('searchOverlay'),sc=document.getElementById('searchCard');o.classList.remove('hidden');sc.classList.add('animate-in');document.body.style.overflow='hidden';document.getElementById('searchInput').focus();};
window.closeSearch=function(){var sc=document.getElementById('searchCard'),o=document.getElementById('searchOverlay');sc.classList.add('animate-out');setTimeout(function(){o.classList.add('hidden');sc.classList.remove('animate-in','animate-out');document.getElementById('searchInput').value='';state.query='';document.body.style.overflow=isOverlayOpen()?'hidden':'';applyFilters();},250);};

// 搜索
(function(){
  var si=document.getElementById('searchInput'),sr=document.getElementById('searchResults'),dt;
  si.addEventListener('input',function(){
    clearTimeout(dt);var self=this;
    dt=setTimeout(function(){
      var q=self.value.trim();state.query=q;
      if(!q){sr.innerHTML='';applyFilters();return;}
      var matches=state.exercises.filter(function(ex){return H.searchMatch(ex,q);}).slice(0,20);
      if(matches.length===0){sr.innerHTML='<p class="text-sm text-secondary text-center py-8">未找到匹配动作</p>';}
      else{var h='';matches.forEach(function(ex){h+='<div class="search-result-item px-4 py-3 rounded-xl cursor-pointer transition-colors" style="background:var(--search-bg)" onmouseover="this.style.background=\'#f5f5f7\'" onmouseout="this.style.background=\'var(--search-bg)\'" data-sid="'+ex.id+'"><span class="font-medium" style="color:var(--search-text)">'+ex.name+'</span><span class="text-xs sub ml-2">'+H.getDiffStars(ex.difficulty)+'</span><span class="text-xs sub ml-2">'+ex.bodyRegion+'</span></div>';});sr.innerHTML=h;}
      applyFilters();
    },200);
  });
  sr.addEventListener('click',function(e){var el=e.target.closest('[data-sid]');if(el){closeSearch();showDetail(el.getAttribute('data-sid'));}});
  // 点击遮罩关闭
  document.getElementById('searchOverlay').addEventListener('click',function(e){if(e.target===this)closeSearch();});
  document.getElementById('detailOverlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});
  // ESC 关闭
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeSearch();closeDetail();closeCalc();}});
  document.getElementById('calcOverlay').addEventListener('click',function(e){if(e.target===this)closeCalc();});
})();

// 主题切换
window.toggleTheme=function(){
  var html=document.documentElement,btn=document.getElementById('themeBtn');
  var isDark=!html.classList.contains('dark');
  html.classList.toggle('dark',isDark);html.classList.toggle('light',!isDark);
  btn.textContent=isDark?'☀️':'🌙';
  try{localStorage.setItem('fitness-theme',isDark?'dark':'light');}catch(e){}
  document.body.style.overflow='';document.body.style.overflow=isOverlayOpen()?'hidden':'';
};

// 启动
function init(){
  state.exercises=window.ALL_EXERCISES||[];state.filtered=state.exercises.slice();
  var html=document.documentElement,btn=document.getElementById('themeBtn'),saved;
  try{saved=localStorage.getItem('fitness-theme');}catch(e){saved=null;}
  if(saved==='light'){html.classList.remove('dark');html.classList.add('light');btn.textContent='🌙';}
  else{html.classList.remove('light');html.classList.add('dark');btn.textContent='☀️';}
  btn.style.visibility='visible';
  initPills();renderCards();
  console.log('✅ 健身运动库已就绪 — '+state.exercises.length+' 个动作');
}
var calcGender='male';
window.setGender=function(g,el){calcGender=g;document.getElementById('btnMale').style.cssText='background:'+(g==='male'?'var(--search-text)':'#f5f5f7')+';color:'+(g==='male'?'var(--search-bg)':'var(--search-placeholder)');document.getElementById('btnFemale').style.cssText='background:'+(g==='female'?'var(--search-text)':'#f5f5f7')+';color:'+(g==='female'?'var(--search-bg)':'var(--search-placeholder)');};
window.doCalc=function(){
  var h=parseFloat(document.getElementById('inHeight').value),w=parseFloat(document.getElementById('inWeight').value),a=parseInt(document.getElementById('inAge').value);
  if(!h||!w||!a){alert('请填写完整的身高、体重和年龄');return;}
  var bmi=w/((h/100)*(h/100)),bmr;
  if(calcGender==='male')bmr=10*w+6.25*h-5*a+5;else bmr=10*w+6.25*h-5*a-161;
  var label='';if(bmi<18.5)label='偏瘦';else if(bmi<24)label='正常范围 ✅';else if(bmi<28)label='偏重';else label='肥胖';
  document.getElementById('resBmi').textContent=bmi.toFixed(1);
  document.getElementById('resBmiLabel').textContent=label;
  document.getElementById('resBmr').textContent=Math.round(bmr);
  document.getElementById('calcResult').classList.remove('hidden');
};
window.openCalc=function(){var o=document.getElementById('calcOverlay'),cc=document.getElementById('calcCard');o.classList.remove('hidden');cc.classList.add('animate-in');document.body.style.overflow='hidden';};
window.closeCalc=function(){var cc=document.getElementById('calcCard'),o=document.getElementById('calcOverlay');cc.classList.add('animate-out');setTimeout(function(){o.classList.add('hidden');cc.classList.remove('animate-in','animate-out');document.body.style.overflow=isOverlayOpen()?'hidden':'';},250);};
function isOverlayOpen(){return !document.getElementById('searchOverlay').classList.contains('hidden')||!document.getElementById('detailOverlay').classList.contains('hidden')||!document.getElementById('calcOverlay').classList.contains('hidden');}
// Service Worker（离线缓存）
if('serviceWorker' in navigator){
  var swCode='var C="fitness-v1";self.addEventListener("install",function(e){e.waitUntil(caches.open(C).then(function(c){return c.addAll(["./"]).catch(function(){})}));});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).then(function(res){if(res.ok){var clone=res.clone();caches.open(C).then(function(c){c.put(e.request,clone)});}return res;}).catch(function(){return r;});}));});';
  var swBlob=new Blob([swCode],{type:'application/javascript'});
  var swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
