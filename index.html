<body>

<header class="fixed top-0 left-0 w-full z-50 glass border-b border-white/20 dark:border-white/5 transition-colors">
  <div class="px-4 h-14 flex items-center justify-between gap-2 max-w-6xl mx-auto">
    <span class="text-lg font-semibold flex-shrink-0" style="color:var(--text-primary)">🏋️ 运动库</span>
    <div class="flex-1 max-w-md relative">
      <input type="text" id="searchInput" placeholder="搜索动作、肌群、器械..." class="w-full rounded-full px-4 py-2 text-sm shadow-sm" style="background:var(--search-bg);color:var(--search-text);border:2px solid var(--theme-bg-light);min-height:40px" />
    </div>
    <div class="flex items-center gap-1 flex-shrink-0">
      <button onclick="openCalc()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/5 touch-feedback text-lg" aria-label="计算器" style="color:var(--text-primary)">📐</button>
      <button onclick="toggleTheme()" id="themeBtn" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/5 touch-feedback text-lg" aria-label="主题" style="color:var(--text-primary)">🌙</button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 pt-20 pb-8">
  <section class="relative rounded-2xl overflow-hidden mb-6" style="background:var(--theme-bg-light)">
    <div class="px-5 py-6 sm:py-10 flex flex-col gap-3">
      <span class="text-xs font-semibold tracking-[0.2em] uppercase" style="color:var(--text-secondary)">动作库</span>
      <h1 class="text-3xl sm:text-5xl font-bold tracking-tight leading-[1.1]" style="color:var(--text-primary)">探索 <span id="heroCount" style="color:var(--theme-color)">---</span> 个<br>训练动作</h1>
      <p class="text-sm" style="color:var(--text-secondary);max-width:480px">覆盖全身肌群，入门到专业。点击筛选或搜索，找到适合你的动作。</p>
      <div class="flex gap-2 mt-1">
        <button onclick="resetAll()" class="px-6 py-3 rounded-full text-sm font-medium text-white shadow-lg touch-feedback" style="background:var(--theme-color);min-height:44px">浏览全部</button>
        <button onclick="document.getElementById('searchInput').focus()" class="px-6 py-3 rounded-full text-sm font-medium touch-feedback" style="background:var(--theme-bg-light);color:var(--theme-color);min-height:44px">🔍 搜索</button>
      </div>
    </div>
  </section>

  <div class="mb-6 space-y-4">
    <div><div class="flex items-center justify-between mb-2"><h2 class="text-sm font-semibold uppercase tracking-wider" style="color:var(--text-secondary)">🎯 目标肌群（单选）</h2></div><div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="musclePills"></div></div>
    <div><div class="flex items-center justify-between mb-2"><h2 class="text-sm font-semibold uppercase tracking-wider" style="color:var(--text-secondary)">🏃 动作类型（单选）</h2></div><div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="categoryPills"></div></div>
    <div><div class="flex items-center justify-between mb-2"><h2 class="text-sm font-semibold uppercase tracking-wider" style="color:var(--text-secondary)">🔧 器械（多选）</h2></div><div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="equipPills"></div></div>
    <div><div class="flex items-center justify-between mb-2"><h2 class="text-sm font-semibold uppercase tracking-wider" style="color:var(--text-secondary)">📊 难度（多选）</h2></div><div class="flex gap-2 overflow-x-auto no-scrollbar pb-1" id="diffPills"></div></div>
  </div>

  <div class="flex items-center justify-between mb-3">
    <h2 class="section-headline" id="resultLabel">全部动作</h2>
    <span class="text-sm" style="color:var(--text-secondary)" id="resultCount"></span>
  </div>
  <div class="grid grid-cols-1 card-grid gap-3 md:gap-4" id="cardGrid"></div>
  <p class="text-center text-[11px] tracking-wider mt-12 pb-4" style="color:var(--text-secondary);opacity:0.4">健身运动库 · 移动优先</p>
</main>

<footer class="fixed bottom-0 left-0 w-full glass-dark border-t border-white/10 bottom-safe z-40">

<div id="detailOverlay" class="fixed inset-0 z-[60] hidden flex items-start justify-center pt-16 overflow-y-auto" style="background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)">

  <div id="calcCard" class="w-full max-w-md mx-4 rounded-2xl shadow-2xl border overflow-hidden" style="background:var(--bg-primary);border-color:var(--theme-bg-light)">
    <div class="p-4 border-b flex items-center justify-between" style="border-color:var(--theme-bg-light)"><span class="font-semibold" style="color:var(--text-primary)">📐 身体数据计算器</span><button onclick="closeCalc()" class="w-8 h-8 rounded-full flex items-center justify-center text-lg touch-feedback" style="background:var(--theme-bg-light);color:var(--text-primary)">✕</button></div>

      <div><label class="text-xs font-semibold uppercase tracking-wider mb-1.5 block" style="color:var(--text-secondary)">年龄</label><input id="inAge" type="number" placeholder="25" class="w-full py-3 px-4 rounded-xl border text-base" style="background:var(--search-bg);color:var(--search-text);border-color:var(--theme-bg-light)"></div>
      <div id="calcResult" class="hidden space-y-3 pt-3 border-t" style="border-color:var(--theme-bg-light)"><div class="flex justify-between items-center"><span class="text-sm" style="color:var(--text-secondary)">BMI</span><span class="text-xl font-bold" style="color:var(--text-primary)" id="resBmi">--</span></div><div class="flex justify-between items-center"><span class="text-sm" style="color:var(--text-secondary)">BMI 评价</span><span class="text-sm font-semibold" style="color:var(--text-primary)" id="resBmiLabel">--</span></div><div class="flex justify-between items-center"><span class="text-sm" style="color:var(--text-secondary)">基础代谢 (BMR)</span><span class="text-xl font-bold" style="color:var(--text-primary)" id="resBmr">--</span><span class="text-xs" style="color:var(--text-secondary)">千卡/天</span></div></div>
      <button onclick="doCalc()" class="w-full py-3 rounded-xl text-sm font-semibold text-white touch-feedback" style="background:var(--theme-color)">计算</button>
    </div>
  </div>
</div>

var dt;document.getElementById('searchInput').addEventListener('input',function(){clearTimeout(dt);var self=this;dt=setTimeout(function(){state.query=self.value.trim();applyFilters();},200);});
var calcGender='male';
window.setGender=function(g,el){calcGender=g;document.getElementById('btnMale').style.cssText='background:'+(g==='male'?'var(--theme-color)':'var(--theme-bg-light)')+';color:'+(g==='male'?'#fff':'var(--text-secondary)');document.getElementById('btnFemale').style.cssText='background:'+(g==='female'?'var(--theme-color)':'var(--theme-bg-light)')+';color:'+(g==='female'?'#fff':'var(--text-secondary)');};
window.doCalc=function(){var h=parseFloat(document.getElementById('inHeight').value),w=parseFloat(document.getElementById('inWeight').value),a=parseInt(document.getElementById('inAge').value);if(!h||!w||!a){alert('请填写完整的身高、体重和年龄');return;}var bmi=w/((h/100)*(h/100)),bmr;if(calcGender==='male')bmr=10*w+6.25*h-5*a+5;else bmr=10*w+6.25*h-5*a-161;var label='';if(bmi<18.5)label='偏瘦';else if(bmi<24)label='正常范围 ✅';else if(bmi<28)label='偏重';else label='肥胖';document.getElementById('resBmi').textContent=bmi.toFixed(1);document.getElementById('resBmiLabel').textContent=label;document.getElementById('resBmr').textContent=Math.round(bmr);document.getElementById('calcResult').classList.remove('hidden');};
window.openCalc=function(){var o=document.getElementById('calcOverlay'),cc=document.getElementById('calcCard');o.classList.remove('hidden');cc.classList.add('animate-in');document.body.style.overflow='hidden';};
window.closeCalc=function(){var cc=document.getElementById('calcCard'),o=document.getElementById('calcOverlay');cc.classList.add('animate-out');setTimeout(function(){o.classList.add('hidden');cc.classList.remove('animate-in','animate-out');document.body.style.overflow=isOverlayOpen()?'hidden':'';},200);};
function isOverlayOpen(){return !document.getElementById('detailOverlay').classList.contains('hidden')||!document.getElementById('calcOverlay').classList.contains('hidden');}
window.toggleTheme=function(){
  var html=document.documentElement,current=html.getAttribute('data-theme')||'blue',btn=document.getElementById('themeBtn');
  var isDark=current.indexOf('dark')!==-1;
  if(isDark){html.setAttribute('data-theme',current.replace('-dark',''));btn.textContent='🌙';}
  else{html.setAttribute('data-theme',current+'-dark');btn.textContent='☀️';}
  try{localStorage.setItem('fitness-theme',html.getAttribute('data-theme'));}catch(e){}
};
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeDetail();closeCalc();}});
document.getElementById('detailOverlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});
document.getElementById('calcOverlay').addEventListener('click',function(e){if(e.target===this)closeCalc();});
function init(){
  state.exercises=window.ALL_EXERCISES||[];state.filtered=state.exercises.slice();
  var saved;try{saved=localStorage.getItem('fitness-theme');}catch(e){saved=null;}
  if(saved)document.documentElement.setAttribute('data-theme',saved);
  var isDark=(document.documentElement.getAttribute('data-theme')||'').indexOf('dark')!==-1;
  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';
  initPills();renderCards();
  console.log('✅ 健身运动库已就绪 — '+state.exercises.length+' 个动作');
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
